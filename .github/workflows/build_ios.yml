name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: geldroid
        run: flutter pub get

      - name: Build iOS app (no codesign)
        working-directory: geldroid
        run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd geldroid/build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r GelDroid.ipa Payload/
          mv GelDroid.ipa $GITHUB_WORKSPACE/GelDroid.ipa

      - name: Create public release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: GelDroid iOS (build ${{ github.run_number }})
          files: GelDroid.ipa
          generate_release_notes: false
