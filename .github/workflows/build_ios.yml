name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-ios:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: 'stable'

      - name: Install dependencies
        working-directory: geldroid
        run: flutter pub get

      - name: Build IPA (no codesign)
        working-directory: geldroid
        run: flutter build ipa --no-codesign

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: GelDroid-iOS
          path: geldroid/build/ios/ipa/*.ipa
          retention-days: 30
